title: "Foire aux questions"

questions:
  - question: "Quelles sont les conditions d'âge pour louer une voiture chez Boyacars ?"
    answer: "L'âge minimum requis pour louer une voiture chez Boyacars est de 21 ans. Certaines catégories de voitures peuvent avoir des exigences d'âge supérieures. Un supplément jeune conducteur peut être appliqué pour les conducteurs de moins de 25 ans."

  - question: "Dois-je payer des frais supplémentaires pour des conducteurs additionnels ?"
    answer: "Des frais supplémentaires peuvent s'appliquer pour des conducteurs additionnels. Ces frais varient en fonction du nombre de conducteurs additionnels et de la durée de la location. Veuillez consulter nos conditions générales pour plus d'informations."

  - question: "Puis-je modifier ou annuler ma réservation après l'avoir effectuée ?"
    answer: "Oui, vous pouvez modifier ou annuler votre réservation après l'avoir effectuée. Pour ce faire, veuillez nous contacter par téléphone ou e-mail. Des frais d'annulation peuvent s'appliquer en fonction du délai d'annulation."

  - question: "Puis-je traverser les frontières avec la voiture de location ?"
    answer: "Les véhicules de location Boyacars ne peuvent généralement pas être conduits en dehors du Maroc. Si vous prévoyez de voyager dans un autre pays, veuillez nous en informer avant la location pour que nous puissions vous fournir les informations nécessaires et, si possible, les autorisations appropriées. Des frais supplémentaires peuvent s'appliquer."

  - question: "Dois-je retourner la voiture avec le plein de carburant ?"
    answer: "La politique de carburant varie selon les agences. Chez Boyacars, nous vous demandons généralement de retourner la voiture avec le même niveau de carburant qu'au moment de la prise en charge. Si la voiture est retournée avec moins de carburant, des frais de réapprovisionnement en carburant seront appliqués."
