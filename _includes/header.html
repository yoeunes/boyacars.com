<!-- Header -->
<header class="sticky top-0 bg-white/95 backdrop-blur-md shadow-sm z-50 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">
      <!-- Logo -->
      <a href="/" class="flex items-center group">
        <img src="{{ site.data.site.logo }}" alt="{{ site.data.site.name }}" class="h-11 transition-transform group-hover:scale-105">
      </a>

      <!-- Mobile Menu Button -->
      <div class="lg:hidden" data-controller="slidebar">
        <button class="w-11 h-11 flex items-center justify-center rounded-xl bg-gray-100 hover:bg-gray-200 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2" data-action="click->slidebar#toggle" aria-label="Ouvrir le menu">
          <i class="fa-solid fa-bars text-xl text-gray-700"></i>
        </button>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden lg:flex items-center space-x-2">
        {% for item in site.data.navigation.main %}
          <a href="{{ item.url }}" class="relative px-4 py-2 text-gray-600 font-medium hover:text-gray-900 transition-colors rounded-lg hover:bg-gray-100 group">
            {{ item.title }}
            <span class="absolute bottom-1 left-4 right-4 h-0.5 bg-primary scale-x-0 group-hover:scale-x-100 transition-transform origin-left {% if page.url == item.url %}scale-x-100{% endif %}"></span>
          </a>
        {% endfor %}

        <!-- CTA Button -->
        <a href="https://wa.me/{{ site.data.site.contact.whatsapp }}"
           target="_blank"
           rel="noopener noreferrer"
           class="ml-4 inline-flex items-center bg-primary hover:bg-primary-dark text-white font-semibold py-2.5 px-5 rounded-full transition-all duration-300 hover:shadow-lg hover:shadow-primary/25 hover:scale-105 group">
          <i class="fa-brands fa-whatsapp text-lg mr-2 group-hover:scale-110 transition-transform"></i>
          <span>Réserver</span>
        </a>
      </nav>
    </div>
  </div>
</header>

<!-- Mobile Slidebar -->
<div class="mobile-slidebar fixed inset-y-0 left-0 w-80 bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300" data-slidebar-target="slidebar">
  <div class="p-6 h-full flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between mb-10">
      <img src="{{ site.data.site.logo }}" alt="{{ site.data.site.name }}" class="h-10">
      <button class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-100 hover:bg-gray-200 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2" data-action="click->slidebar#toggle" aria-label="Fermer le menu">
        <i class="fa-solid fa-times text-xl text-gray-600"></i>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1">
      <ul class="space-y-2">
        {% for item in site.data.navigation.main %}
          <li>
            <a href="{{ item.url }}" class="flex items-center px-4 py-3 text-gray-700 font-medium rounded-xl hover:bg-gray-100 hover:text-primary transition-all group">
              <span class="w-2 h-2 bg-primary/30 rounded-full mr-3 group-hover:bg-primary transition-colors"></span>
              {{ item.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>

    <!-- Bottom CTA -->
    <div class="pt-6 border-t border-gray-100">
      <a href="https://wa.me/{{ site.data.site.contact.whatsapp }}"
         target="_blank"
         rel="noopener noreferrer"
         class="flex items-center justify-center bg-[#25D366] hover:bg-[#20BA5C] text-white font-semibold py-4 px-4 rounded-xl transition-all w-full shadow-lg shadow-[#25D366]/25">
        <i class="fa-brands fa-whatsapp text-2xl mr-2"></i>
        <span>Réserver sur WhatsApp</span>
      </a>
      <a href="tel:{{ site.data.site.contact.phone_raw }}" class="flex items-center justify-center text-gray-600 font-medium py-3 mt-3 hover:text-primary transition-colors">
        <i class="fa-solid fa-phone mr-2"></i>
        {{ site.data.site.contact.phone }}
      </a>
    </div>
  </div>
</div>
