{% comment %}
  Info Card Component for Practical Information

  Usage: {% include blog/info-card.html label="Distance" value="180 km" %}

  Parameters:
    label: Label text
    value: Value text
{% endcomment %}
<div class="bg-gray-50 rounded-lg p-4">
  <p class="text-sm text-gray-500 mb-1">{{ include.label }}</p>
  <p class="font-semibold text-gray-900">{{ include.value }}</p>
</div>
