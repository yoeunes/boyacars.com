<!-- Hero Section -->
<section class="relative min-h-[70vh] flex items-center justify-center overflow-hidden">
  <!-- Background Image with Overlay -->
  <div class="absolute inset-0">
    <img
      src="/assets/images/slider/marrakech-background.jpg"
      alt="Marrakech"
      class="w-full h-full object-cover"
      loading="eager">
    <div class="absolute inset-0 bg-gradient-to-r from-gray-900/90 via-gray-900/75 to-gray-900/60"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 text-center">
    <!-- Badge -->
    <div class="inline-flex items-center bg-white/10 backdrop-blur-sm rounded-full px-5 py-2 mb-8 border border-white/20">
      <span class="w-2 h-2 bg-primary rounded-full mr-3 animate-pulse"></span>
      <span class="text-white/90 text-sm font-medium">Disponible 24h/7j à Marrakech</span>
    </div>

    <!-- Main Headline -->
    <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-display font-bold text-white mb-6 leading-tight">
      Location de Voitures<br>
      <span class="text-primary">Premium</span> à Marrakech
    </h1>

    <!-- Subheadline -->
    <p class="text-lg sm:text-xl text-white/80 max-w-2xl mx-auto mb-10 leading-relaxed">
      Des véhicules de qualité, un service personnalisé et des prix transparents.
      Votre partenaire de confiance depuis plus de 10 ans.
    </p>

    <!-- CTA Buttons -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-12">
      <a href="https://wa.me/{{ site.data.site.contact.whatsapp }}"
         target="_blank"
         rel="noopener noreferrer"
         class="inline-flex items-center bg-primary hover:bg-primary-dark text-white font-bold py-4 px-8 rounded-full text-lg transition-all duration-300 hover:shadow-lg hover:scale-105">
        <i class="fa-brands fa-whatsapp text-2xl mr-3"></i>
        Réserver maintenant
      </a>
      <a href="/parc/"
         class="inline-flex items-center bg-white/10 hover:bg-white/20 text-white font-semibold py-4 px-8 rounded-full text-lg transition-all duration-300 border border-white/30 backdrop-blur-sm">
        <i class="fa-solid fa-car mr-3"></i>
        Voir nos véhicules
      </a>
    </div>

    <!-- Trust Badges -->
    <div class="flex flex-wrap items-center justify-center gap-8 text-white/70">
      <div class="flex items-center">
        <i class="fa-solid fa-shield-check text-primary text-xl mr-2"></i>
        <span class="text-sm">Assurance incluse</span>
      </div>
      <div class="flex items-center">
        <i class="fa-solid fa-truck-fast text-primary text-xl mr-2"></i>
        <span class="text-sm">Livraison gratuite</span>
      </div>
      <div class="flex items-center">
        <i class="fa-solid fa-credit-card text-primary text-xl mr-2"></i>
        <span class="text-sm">Sans caution</span>
      </div>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 animate-bounce">
    <i class="fa-solid fa-chevron-down text-white/50 text-2xl"></i>
  </div>
</section>
