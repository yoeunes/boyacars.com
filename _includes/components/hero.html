<!-- Hero Section -->
<section class="relative min-h-[85vh] flex items-center justify-center overflow-hidden">
  <!-- Background Image with Overlay -->
  <div class="absolute inset-0">
    <img
      src="/assets/images/slider/marrakech-background.jpg"
      alt="Marrakech"
      class="w-full h-full object-cover"
      loading="eager">
    <div class="absolute inset-0 bg-gradient-to-r from-gray-900/95 via-gray-900/80 to-gray-900/70"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 text-center">
    <!-- Badge -->
    <div class="inline-flex items-center bg-white/10 backdrop-blur-md rounded-full px-6 py-2.5 mb-10 border border-white/20">
      <span class="w-2.5 h-2.5 bg-primary rounded-full mr-3 animate-pulse"></span>
      <span class="text-white font-medium">Disponible 24h/7j à Marrakech</span>
    </div>

    <!-- Main Headline -->
    <h1 class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-extrabold text-white mb-8 leading-[1.1] tracking-tight">
      Location de Voitures<br>
      <span class="text-primary">Premium</span>
    </h1>

    <!-- Subheadline -->
    <p class="text-xl sm:text-2xl text-gray-300 max-w-2xl mx-auto mb-12 leading-relaxed font-medium">
      Des véhicules de qualité, un service personnalisé<br class="hidden sm:block"> et des prix transparents.
    </p>

    <!-- CTA Buttons -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-16">
      <a href="https://wa.me/{{ site.data.site.contact.whatsapp }}"
         target="_blank"
         rel="noopener noreferrer"
         class="inline-flex items-center bg-[#25D366] hover:bg-[#20BA5C] text-white font-bold py-5 px-10 rounded-full text-lg transition-all duration-300 hover:shadow-2xl hover:shadow-[#25D366]/30 hover:scale-105 group">
        <i class="fa-brands fa-whatsapp text-2xl mr-3 group-hover:scale-110 transition-transform"></i>
        Réserver maintenant
      </a>
      <a href="/parc/"
         class="inline-flex items-center bg-white/10 hover:bg-white/20 text-white font-semibold py-5 px-10 rounded-full text-lg transition-all duration-300 border border-white/30 backdrop-blur-sm">
        <i class="fa-solid fa-car mr-3"></i>
        Voir nos véhicules
      </a>
    </div>

    <!-- Trust Badges -->
    <div class="flex flex-wrap items-center justify-center gap-x-10 gap-y-4">
      <div class="flex items-center text-white/80">
        <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center mr-3">
          <i class="fa-solid fa-shield-check text-primary"></i>
        </div>
        <span class="font-medium">Assurance incluse</span>
      </div>
      <div class="flex items-center text-white/80">
        <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center mr-3">
          <i class="fa-solid fa-truck-fast text-primary"></i>
        </div>
        <span class="font-medium">Livraison gratuite</span>
      </div>
      <div class="flex items-center text-white/80">
        <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center mr-3">
          <i class="fa-solid fa-credit-card text-primary"></i>
        </div>
        <span class="font-medium">Sans caution</span>
      </div>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2">
    <div class="w-8 h-12 border-2 border-white/30 rounded-full flex justify-center pt-2">
      <div class="w-1.5 h-3 bg-white/50 rounded-full animate-bounce"></div>
    </div>
  </div>
</section>
