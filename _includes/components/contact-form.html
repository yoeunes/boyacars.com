<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-4">
  <div>
    <input
      type="text"
      name="name"
      placeholder="Votre nom"
      required
      class="form-input w-full rounded border-gray-300 focus:border-primary focus:ring-primary"
    >
  </div>

  <div>
    <input
      type="email"
      name="email"
      placeholder="Votre email"
      required
      class="form-input w-full rounded border-gray-300 focus:border-primary focus:ring-primary"
    >
  </div>

  <div>
    <textarea
      name="message"
      placeholder="Votre message"
      rows="10"
      required
      class="form-textarea w-full rounded border-gray-300 focus:border-primary focus:ring-primary"
    ></textarea>
  </div>

  <div>
    <button type="submit" class="px-6 py-3 bg-primary hover:bg-primary-dark text-white rounded transition-colors font-semibold">
      Envoyer
    </button>
  </div>
</form>
