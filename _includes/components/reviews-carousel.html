<section class="py-20 bg-white animate-fade-in">
  <div class="max-w-8xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-display font-bold text-gray-900 mb-4">
        {{ site.data.reviews.title }}
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      {% for review in site.data.reviews.reviews %}
        <div class="bg-gray-50 rounded-2xl p-8 border border-gray-200 hover:border-gold transition-all duration-300">
          <div class="flex items-center mb-4">
            {% for i in (1..5) %}
              <i class="fa-solid fa-star text-gold text-lg"></i>
            {% endfor %}
          </div>

          <p class="text-gray-700 text-lg mb-6 italic">
            "{{ review.comment }}"
          </p>

          <div class="flex items-center">
            <img src="{{ review.picture }}" class="w-12 h-12 rounded-full object-cover" alt="{{ review.name }}" loading="lazy">
            <div class="ml-4">
              <div class="font-semibold text-gray-900">{{ review.name }}</div>
              <div class="text-sm text-gray-600">{{ review.location }}</div>
              <div class="text-xs text-gray-500 mt-1">
                <i class="fa-solid fa-car text-primary mr-1"></i> {{ review.vehicle }} • {{ review.date }}
              </div>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
