<!-- WhatsApp Floating Button -->
<a href="https://wa.me/{{ site.data.site.contact.whatsapp }}"
   target="_blank"
   rel="noopener noreferrer"
   class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-[#25D366] rounded-full shadow-lg flex items-center justify-center hover:bg-[#20BA5C] transition-all duration-300 hover:scale-110 group"
   aria-label="Contacter via WhatsApp">
  <i class="fa-brands fa-whatsapp text-white text-3xl"></i>
  <!-- Pulse animation -->
  <span class="absolute w-full h-full rounded-full bg-[#25D366] animate-ping opacity-40"></span>
  <!-- Tooltip -->
  <span class="absolute right-full mr-3 bg-gray-900 text-white text-sm py-2 px-4 rounded-lg whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none">
    Besoin d'aide ?
  </span>
</a>
