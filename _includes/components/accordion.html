<section class="py-20 bg-white animate-fade-in">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-display font-bold text-gray-900 mb-4">
        Questions Fréquentes
      </h2>
      <p class="text-lg text-gray-600">
        Tout ce que vous devez savoir sur la location chez Boyacars
      </p>
    </div>

    <div class="space-y-4" data-controller="accordion">
      {% for question in site.data.faqs.questions %}
        <div class="border border-gray-200 rounded-xl overflow-hidden" data-accordion-target="item">
          <button data-action="click->accordion#toggle" class="w-full text-left p-6 flex items-center justify-between bg-white hover:bg-gray-50 transition-colors">
            <span class="font-semibold text-gray-900 pr-4">{{ question.question }}</span>
            <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-300"></i>
          </button>
          <div class="accordion__content max-h-0 overflow-hidden bg-gray-50">
            <p class="p-6 text-gray-600">{{ question.answer }}</p>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
