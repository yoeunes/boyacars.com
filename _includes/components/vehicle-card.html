<a href="{{ include.vehicle.url }}" class="bg-white rounded-lg shadow-lg overflow-hidden transform hover:scale-105 transition-transform duration-300 ease-in-out">
  <div class="relative">
    <div>
      {% if include.vehicle.image %}
        <img class="object-cover w-full h-48" src="/assets/images/cars/{{ include.vehicle.image }}" alt="{{ include.vehicle.title }}" loading="lazy">
      {% else %}
        <div class="flex items-center justify-center h-48 text-6xl text-primary-dark">
          <i class="fa-solid fa-car"></i>
        </div>
      {% endif %}
    </div>
    {% if include.vehicle.rates.size > 0 %}
      <div class="absolute top-2 right-2 bg-primary text-white py-1 px-3 rounded-full font-semibold text-sm">
        {{ include.vehicle.rates[0].price }} DH
      </div>
    {% endif %}
  </div>
  <div class="p-4">
    <h2 class="text-lg font-semibold text-primary-dark mb-2">{{ include.vehicle.title }}</h2>
    <div class="flex flex-wrap gap-2">
      <span class="bg-gray-200 rounded-full px-2 py-1 text-xs font-semibold text-gray-700">
        <i class="fa-solid fa-gas-pump text-primary"></i> {{ include.vehicle.fuel }}
      </span>
      <span class="bg-gray-200 rounded-full px-2 py-1 text-xs font-semibold text-gray-700">
        <i class="fa-solid fa-palette text-primary"></i> {{ include.vehicle.color }}
      </span>
      <span class="bg-gray-200 rounded-full px-2 py-1 text-xs font-semibold text-gray-700">
        <i class="fa-solid fa-gear text-primary"></i> {{ include.vehicle.transmission }}
      </span>
    </div>
  </div>
</a>
