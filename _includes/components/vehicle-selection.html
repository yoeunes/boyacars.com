<section class="container mx-auto my-16 px-4">
  <div class="text-center mb-8">
    <h2 class="text-4xl uppercase font-bold text-gray-800 tracking-widest mb-2">Notre Sélection</h2>
    <div class="w-16 h-1 bg-primary mx-auto mb-4"></div>
    <p class="text-lg text-gray-600">Choisissez la voiture idéale</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-16">
    {% assign vehicles = site.vehicles | where: "published", true | limit: 6 %}
    {% for vehicle in vehicles %}
      {% include components/vehicle-card.html vehicle=vehicle %}
    {% endfor %}
  </div>

  <div class="text-center mt-12">
    <a href="/parc/" class="inline-block px-8 py-3 bg-primary hover:bg-primary-dark text-white rounded-lg uppercase font-semibold tracking-widest transition-colors">
      Voir tout le parc
    </a>
  </div>
</section>
