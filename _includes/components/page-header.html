<section class="relative bg-gray-800 py-20">
  <img src="/assets/images/backgrounds/page-header-background.jpg" class="absolute inset-0 h-full w-full object-cover brightness-50" alt="Header background" loading="lazy">

  <div class="container mx-auto px-4 relative z-10">
    <h1 class="text-4xl md:text-5xl font-bold text-white text-center uppercase tracking-widest">
      {{ include.title }}
    </h1>

    <nav class="flex justify-center mt-4" aria-label="Breadcrumb">
      <ol class="flex items-center space-x-2 text-white">
        <li>
          <a href="/" class="hover:text-primary transition-colors">Accueil</a>
        </li>
        {% if include.breadcrumb %}
          <li>
            <span class="mx-2">/</span>
          </li>
          <li>
            <a href="/parc/" class="hover:text-primary transition-colors">{{ include.breadcrumb }}</a>
          </li>
        {% endif %}
        <li>
          <span class="mx-2">/</span>
        </li>
        <li class="text-primary font-semibold">{{ include.title }}</li>
      </ol>
    </nav>
  </div>
</section>
