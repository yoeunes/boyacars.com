<section class="py-20 bg-gray-50 animate-fade-in">
  <div class="max-w-8xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-display font-bold text-gray-900 mb-4">
        {{ site.data.features.title }}
      </h2>
      <p class="text-lg text-gray-600 max-w-2xl mx-auto">
        {{ site.data.features.subtitle }}
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      {% for option in site.data.features.options %}
        <div class="bg-white rounded-2xl border border-gray-200 p-8 transition-all duration-300 hover:border-gold hover:shadow-premium group">
          <div class="inline-flex items-center justify-center w-14 h-14 bg-primary/10 rounded-xl mb-5 group-hover:bg-primary transition-colors duration-300">
            <i class="{{ option.icon }} text-3xl text-primary group-hover:text-white transition-colors"></i>
          </div>
          <h3 class="text-xl font-bold text-gray-900 mb-3">{{ option.title }}</h3>
          <p class="text-gray-600">{{ option.description }}</p>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
