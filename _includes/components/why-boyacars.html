<section class="relative mt-8 bg-opacity-50 bg-cover bg-bottom py-16">
  <img src="/assets/images/backgrounds/mountains-background.png" class="absolute -z-10 h-full w-full object-cover" alt="Background" loading="lazy">

  <div class="container mx-auto px-4">
    <div class="mb-8 text-center">
      <div class="mb-2 text-lg font-semibold">{{ site.data.features.subtitle }}</div>
      <h2 class="mb-2 text-4xl font-bold uppercase tracking-widest">{{ site.data.features.title }}</h2>
      <div class="w-16 h-1 bg-primary mx-auto mb-4"></div>
      <p class="mt-4 mb-2 text-lg">{{ site.data.features.text }}</p>
      <p class="text-lg font-semibold">{{ site.data.features.options_text }}</p>
    </div>

    <div class="mt-16 grid gap-8 md:grid-cols-2 lg:grid-cols-3">
      {% for option in site.data.features.options %}
        <div class="flex items-center rounded-full px-4 py-4 shadow transition-colors duration-200 hover:bg-primary hover:text-white bg-white">
          <div class="mr-4 flex h-16 w-16 items-center justify-center rounded-full bg-gray-200">
            <i class="{{ option.icon }} text-primary font-semibold text-3xl"></i>
          </div>
          <div class="flex-1 text-xl lg:text-2xl">{{ option.title }}</div>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
