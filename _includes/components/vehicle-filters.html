<!-- Vehicle Filters -->
<div class="bg-white rounded-2xl shadow-lg p-6 mb-10 border border-gray-100">
  <div class="flex flex-col lg:flex-row lg:items-center gap-6">
    <!-- Filters -->
    <div class="flex-1 grid grid-cols-1 sm:grid-cols-3 gap-4">
      <!-- Fuel Filter -->
      <div>
        <label for="fuel-filter" class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fa-solid fa-gas-pump text-primary mr-1.5"></i>
          Carburant
        </label>
        <select
          id="fuel-filter"
          data-vehicle-filter-target="fuelFilter"
          data-action="change->vehicle-filter#filter"
          class="w-full rounded-xl border-gray-200 bg-gray-50 shadow-sm focus:border-primary focus:ring-primary py-3 px-4 text-gray-700 font-medium">
          <option value="">Tous</option>
          <option value="diesel">Diesel</option>
          <option value="essence">Essence</option>
        </select>
      </div>

      <!-- Transmission Filter -->
      <div>
        <label for="transmission-filter" class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fa-solid fa-gear text-primary mr-1.5"></i>
          Transmission
        </label>
        <select
          id="transmission-filter"
          data-vehicle-filter-target="transmissionFilter"
          data-action="change->vehicle-filter#filter"
          class="w-full rounded-xl border-gray-200 bg-gray-50 shadow-sm focus:border-primary focus:ring-primary py-3 px-4 text-gray-700 font-medium">
          <option value="">Toutes</option>
          <option value="automatique">Automatique</option>
          <option value="manuelle">Manuelle</option>
        </select>
      </div>

      <!-- Price Filter -->
      <div>
        <label for="price-filter" class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fa-solid fa-tag text-primary mr-1.5"></i>
          Prix max/jour
        </label>
        <select
          id="price-filter"
          data-vehicle-filter-target="priceFilter"
          data-action="change->vehicle-filter#filter"
          class="w-full rounded-xl border-gray-200 bg-gray-50 shadow-sm focus:border-primary focus:ring-primary py-3 px-4 text-gray-700 font-medium">
          <option value="">Tous les prix</option>
          <option value="300">Jusqu'à 300 DH</option>
          <option value="500">Jusqu'à 500 DH</option>
          <option value="800">Jusqu'à 800 DH</option>
          <option value="1000">Jusqu'à 1000 DH</option>
        </select>
      </div>
    </div>

    <!-- Divider (Desktop) -->
    <div class="hidden lg:block w-px h-16 bg-gray-200"></div>

    <!-- Actions -->
    <div class="flex items-center justify-between lg:justify-start gap-4">
      <button
        type="button"
        data-action="click->vehicle-filter#reset"
        class="inline-flex items-center px-4 py-2.5 text-gray-600 hover:text-primary hover:bg-gray-50 rounded-xl transition-all font-medium">
        <i class="fa-solid fa-rotate-right mr-2"></i>
        Réinitialiser
      </button>
      <div class="bg-primary/10 text-primary font-bold px-5 py-2.5 rounded-xl whitespace-nowrap">
        <i class="fa-solid fa-car mr-2"></i>
        <span data-vehicle-filter-target="count">0 véhicules</span>
      </div>
    </div>
  </div>
</div>
