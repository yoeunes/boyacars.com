<meta charset="utf-8">
<meta http-equiv="x-ua-compatible" content="ie=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta content="telephone=no" name="format-detection">
<meta name="HandheldFriendly" content="true">
<meta name="theme-color" content="#10B981">
<meta name="robots" content="index, follow">
<meta name="author" content="Younes Khoubza">
<meta property="business:contact_data:address" content="{{ site.data.site.contact.address }}">

<title>{% if page.seo.title %}{{ page.seo.title }}{% elsif page.title %}{{ page.title }} | {{ site.data.site.name }}{% else %}{{ site.data.site.name }} - {{ site.data.site.tagline }}{% endif %}</title>

<meta name="description" content="{% if page.seo.description %}{{ page.seo.description }}{% elsif page.description %}{{ page.description }}{% else %}{{ site.data.site.description }}{% endif %}">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="{% if page.seo.title %}{{ page.seo.title }}{% elsif page.title %}{{ page.title }}{% else %}{{ site.data.site.name }}{% endif %}">
<meta property="og:description" content="{% if page.seo.description %}{{ page.seo.description }}{% elsif page.description %}{{ page.description }}{% else %}{{ site.data.site.description }}{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ site.data.site.logo_light | absolute_url }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@boyacars">
<meta name="twitter:title" content="{% if page.seo.title %}{{ page.seo.title }}{% elsif page.title %}{{ page.title }}{% else %}{{ site.data.site.name }}{% endif %}">
<meta name="twitter:description" content="{% if page.seo.description %}{{ page.seo.description }}{% elsif page.description %}{{ page.description }}{% else %}{{ site.data.site.description }}{% endif %}">
<meta name="twitter:image" content="{{ site.data.site.logo_light | absolute_url }}">

<!-- Favicon -->
<link rel="icon" href="/assets/images/favicons/favicon.ico">
<link rel="apple-touch-icon" href="/assets/images/favicons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicons/favicon-16x16.png">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Vite CSS -->
<link rel="stylesheet" href="/assets/vite/main.css">

{% include seo/structured-data.html %}
