# Site settings
title: Boyacars
tagline: Location de Voitures à Marrakech
description: Location de voiture économique à Marrakech
url: "https://boyacars.com"
baseurl: ""
lang: fr

# Build settings
markdown: kramdown
permalink: pretty

# Collections
collections:
  vehicles:
    output: true
    permalink: /voiture/:slug/
  blog:
    output: true
    permalink: /blog/:slug/

# Defaults
defaults:
  - scope:
      path: ""
      type: "vehicles"
    values:
      layout: "vehicle"
  - scope:
      path: ""
      type: "blog"
    values:
      layout: "post"

# Include pages directory
include:
  - pages

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - package.json
  - package-lock.json
  - vite.config.js
  - tailwind.config.js
  - postcss.config.js
  - bin
  - frontend
  - README.md

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Keep files during build
keep_files:
  - assets/vite
